<!DOCTYPE html>
<html>
<head>
    <title>Vehicle Parking</title>
</head>
<body>

<h2>Vehicle Parking List</h2>

<a href="/add/">Add Parking</a>

<table border="1" cellpadding="10">

<tr>
    <th>ID</th>
    <th>Vehicle Type</th>
    <th>Vehicle Number</th>
    <th>Owner</th>
    <th>Hours</th>
    <th>Amount</th>
    <th>Status</th>
    <th>Action</th>
</tr>

{% for i in data %}

<tr>

<td>{{i.id}}</td>
<td>{{i.vehicle_type}}</td>
<td>{{i.vehicle_number}}</td>
<td>{{i.owner_name}}</td>
<td>{{i.parked_hours}}</td>
<td>{{i.paid_amount}}</td>
<td>{{i.status}}</td>

<td>
<a href="/edit/{{i.id}}">Edit</a>

<a href="/delete/{{i.id}}">Delete</a>
</td>

</tr>

{% endfor %}

</table>

</body>
</html>
